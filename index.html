<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#0B6E4F" />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0F1511" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>" />
<title>split·it — MAL26</title>

<link rel="preconnect" href="https://db.prasannar.com" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<script defer crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script defer crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.2/dist/pocketbase.umd.js"></script>
<script defer src="app.js?v=3"></script>

<style>
  :root{
    --paper:#F5F7F2; --card:#FFFFFF; --ink:#182019; --mut:#68715F;
    --line:#DFE4D6; --line-soft:#EAEEE3;
    --green:#0B6E4F; --green-2:#0E9F6E; --green-soft:#E2F0E9; --green-ink:#0B6E4F;
    --red:#B3492F; --red-soft:#F6E8E3;
    --amber:#8C6D1F; --amber-soft:#F4EDDA;
    --hero-ink:#F2FBF6;
    --radius:16px;
    --shadow:0 1px 2px rgba(24,32,25,.05),0 4px 16px rgba(24,32,25,.05);
    --shadow-lg:0 8px 32px rgba(24,32,25,.22);
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --body:'IBM Plex Sans',system-ui,sans-serif;
    --disp:'Bricolage Grotesque',var(--body);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#0F1511; --card:#161E18; --ink:#E6EEE7; --mut:#93A08E;
      --line:#28332A; --line-soft:#1E2820;
      --green:#31B98A; --green-2:#0E9F6E; --green-soft:#173328; --green-ink:#4CCB9E;
      --red:#E07B5F; --red-soft:#3A2119;
      --amber:#D6B45C; --amber-soft:#33290F;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
      --shadow-lg:0 8px 32px rgba(0,0,0,.5);
    }
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--paper);-webkit-text-size-adjust:100%}
  body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent}
  #root{max-width:600px;margin:0 auto;padding:0 16px calc(110px + var(--safe-b))}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font:inherit;color:var(--ink);width:100%;padding:11px 13px;
    border:1.5px solid var(--line);border-radius:12px;background:var(--card);outline:none;
    transition:border-color .15s ease,box-shadow .15s ease;font-size:16px}
  input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin:15px 0 6px;
    text-transform:uppercase;letter-spacing:.07em}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px}
  ::placeholder{color:var(--mut);opacity:.6}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  @keyframes slideUp{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  @keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes shimmer{from{background-position:-400px 0}to{background-position:400px 0}}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
  .anim{animation:fadeUp .35s cubic-bezier(.2,.7,.3,1) both}
  .anim-pop{animation:pop .28s cubic-bezier(.2,.7,.3,1) both}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:calc(14px + env(safe-area-inset-top,0px)) 0 12px;
    position:sticky;top:0;z-index:6;margin:0 -16px;padding-left:16px;padding-right:16px;
    background:color-mix(in srgb,var(--paper) 84%,transparent);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  @supports not (background:color-mix(in srgb,red 50%,blue)){.topbar{background:var(--paper)}}
  .wordmark{font-family:var(--disp);font-weight:800;font-size:21px;letter-spacing:-.02em}
  .wordmark b{color:var(--green-ink)}
  .iconbtn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none;
    border:1.5px solid var(--line);background:var(--card);font-size:16px;
    transition:transform .1s ease,border-color .15s ease}
  .iconbtn:active{transform:scale(.92)}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}

  .hero{position:relative;overflow:hidden;border:none;color:var(--hero-ink);
    background:linear-gradient(135deg,#0B6E4F 0%,#0E9F6E 78%,#27B584 100%)}
  .hero::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 88% -10%,rgba(255,255,255,.18),transparent 55%)}
  .hero .k{font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
  .hero .big{font-family:var(--mono);font-weight:600;font-size:clamp(26px,8vw,34px);letter-spacing:-.01em;margin-top:3px}
  .hero .sub{color:var(--hero-ink);opacity:.92}

  h1.disp{font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:-.02em;line-height:1.12}
  h2.disp{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:-.01em}
  h3.h3{font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;
    margin:20px 2px 8px}
  .sub{color:var(--mut);font-size:14px;margin-top:5px;line-height:1.45}
  .mono{font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums}
  .pos{color:var(--green-ink)} .neg{color:var(--red)} .mut{color:var(--mut)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:13px 16px;border-radius:13px;font-weight:600;font-size:15px;
    background:var(--green);color:#fff;transition:transform .1s ease,opacity .15s ease}
  @media (prefers-color-scheme:dark){.btn{color:#08130D}}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
  .btn.danger{background:var(--red-soft);color:var(--red)}
  .btn.sm{width:auto;padding:9px 14px;font-size:13.5px;border-radius:10px}
  .btn:disabled{opacity:.45;cursor:default}

  .rrow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line-soft);
    width:100%;text-align:left;border-radius:4px}
  .rrow:last-child{border-bottom:none}
  button.rrow{transition:background .15s ease}
  button.rrow:active{background:var(--line-soft)}
  .rmain{min-width:0;flex:1}
  .rtitle{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rsub{font-size:12.5px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ramt{font-family:var(--mono);font-weight:600;font-size:15px;white-space:nowrap;text-align:right}
  .ramt small{display:block;font-family:var(--body);font-weight:500;font-size:11px;color:var(--mut)}

  .datechip{flex:none;width:44px;text-align:center;padding:5px 0;border-radius:10px;
    background:var(--line-soft);line-height:1.15}
  .datechip b{display:block;font-family:var(--mono);font-size:15px}
  .datechip span{font-size:9.5px;font-weight:600;letter-spacing:.08em;color:var(--mut);text-transform:uppercase}
  .catmoji{flex:none;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
    font-size:19px;background:var(--line-soft)}

  .avatar{border-radius:50%;display:inline-grid;place-items:center;font-weight:700;color:#fff;flex:none;
    border:2px solid var(--card)}
  .stack{display:flex;align-items:center;gap:10px}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;flex:none;
    border:1.5px solid var(--line);background:var(--card);font-size:13.5px;font-weight:500;
    transition:all .15s ease}
  .chip.on{border-color:var(--green);background:var(--green-soft);color:var(--green-ink)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chips.scrollx{flex-wrap:nowrap;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;
    -webkit-overflow-scrolling:touch}
  .chips.scrollx::-webkit-scrollbar{display:none}

  .fxbox{margin-top:12px;padding:13px 14px;border:1.5px dashed var(--line);border-radius:13px;
    background:var(--line-soft)}
  .fxbox .k{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--mut);margin-bottom:3px}
  .fxpreview{display:flex;flex-direction:column;justify-content:flex-end;padding:0 2px 8px}

  .tabs{display:flex;gap:5px;background:var(--card);border:1.5px solid var(--line);
    border-radius:13px;padding:4px;margin:14px 0;box-shadow:var(--shadow)}
  .tabs button{flex:1;padding:10px 0;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--mut);
    transition:all .18s ease}
  .tabs button.on{background:var(--ink);color:var(--paper)}
  .tabs.mini{box-shadow:none;margin:0 0 12px}

  .fab{position:fixed;bottom:calc(22px + var(--safe-b));left:50%;transform:translateX(-50%);width:auto;
    padding:15px 28px;border-radius:999px;box-shadow:var(--shadow-lg);z-index:5;font-size:15.5px}
  .fab:active{transform:translateX(-50%) scale(.96)}

  .overlay{position:fixed;inset:0;background:rgba(10,16,12,.5);z-index:10;
    display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease;
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  .sheet{background:var(--paper);width:100%;max-width:600px;max-height:92dvh;overflow:auto;
    border-radius:22px 22px 0 0;padding:10px 18px calc(30px + var(--safe-b));
    animation:slideUp .28s cubic-bezier(.2,.7,.3,1);overscroll-behavior:contain}
  .grabzone{touch-action:none;margin:-10px -18px 0;padding:10px 18px 0}
  .grab{width:40px;height:4px;border-radius:99px;background:var(--line);margin:2px auto 12px}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}

  .toast{position:fixed;bottom:calc(96px + var(--safe-b));left:50%;z-index:60;
    animation:toastIn .25s cubic-bezier(.2,.7,.3,1);
    background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:12px;
    font-size:14px;font-weight:500;max-width:88vw;box-shadow:var(--shadow-lg)}
  .empty{text-align:center;color:var(--mut);padding:34px 12px;font-size:14.5px;line-height:1.6}
  .empty .big{font-size:34px;margin-bottom:8px}

  .bar{height:8px;border-radius:99px;background:var(--line-soft);overflow:hidden}
  .bar>div{height:100%;border-radius:99px;transform-origin:left;animation:growX .6s cubic-bezier(.2,.7,.3,1) both}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .center{min-height:78vh;display:flex;flex-direction:column;justify-content:center}
  .err{color:var(--red);font-size:13.5px;margin-top:10px;font-weight:500}
  a{color:var(--green-ink);font-weight:600;cursor:pointer;text-decoration:none}

  .profiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:18px}
  .profile{display:flex;flex-direction:column;align-items:center;gap:9px;padding:18px 6px 14px;
    background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);font-weight:600;font-size:14px;
    transition:transform .12s ease,border-color .15s ease,box-shadow .15s ease}
  .profile:active{transform:scale(.95)}
  .profile.sel{border-color:var(--green);background:var(--green-soft)}

  .stat{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:14px 15px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
  .stat .v{font-family:var(--mono);font-weight:600;font-size:clamp(15px,4.6vw,19px);margin-top:4px}

  .skl{border-radius:var(--radius);height:76px;margin-bottom:14px;border:1.5px solid var(--line-soft);
    background:linear-gradient(90deg,var(--card) 25%,var(--line-soft) 50%,var(--card) 75%);
    background-size:800px 100%;animation:shimmer 1.4s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<noscript>split·it needs JavaScript.</noscript>
</body>
